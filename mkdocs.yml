site_name: Zero to Odoo Expert
site_description: A hands-on, from-scratch Odoo 18 development tutorial.
site_url: https://ronitjadhav.github.io/odoo-tutorial/
repo_url: https://github.com/ronitjadhav/odoo-tutorial
edit_uri: edit/main/docs/
copyright: Content CC BY-SA 4.0 &middot; Code AGPL-3.0

theme:
  name: material
  icon:
    logo: material/car-wrench
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle: {icon: material/weather-night, name: Dark mode}
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle: {icon: material/weather-sunny, name: Light mode}

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - toc: {permalink: true}
  - pymdownx.details
  - pymdownx.highlight: {anchor_linenums: true, line_spans: __span}
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed: {alternate_style: true}
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

